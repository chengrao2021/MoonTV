name: Upstash Redis Keepalive

on:
  schedule:
    - cron: "0 3 * * *"   # 每天运行一次 (UTC时间)
  workflow_dispatch:      # 允许手动运行

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Upstash Redis
        run: |
          echo "Sending keepalive request to Redis..."
          curl -X POST "$UPSTASH_URL/get/keepalive" \
          -H "Authorization: Bearer $UPSTASH_TOKEN"
        env:
          UPSTASH_URL: ${{ secrets.UPSTASH_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_TOKEN }}
